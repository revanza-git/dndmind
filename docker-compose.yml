services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dndmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dndmind}
      POSTGRES_USER: ${POSTGRES_USER:-dndmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dndmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dndmind} -d ${POSTGRES_DB:-dndmind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-worker:
    build:
      context: ./apps/ai-worker
    container_name: dndmind-ai-worker
    restart: unless-stopped
    environment:
      MOCK_LLM: ${MOCK_LLM:-true}
      MOCK_EMBEDDINGS: ${MOCK_EMBEDDINGS:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.7}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-45}
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID:-project-de842900-cb0b-4155-b9c}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-global}
      VERTEX_MODEL: ${VERTEX_MODEL:-gemini-2.5-flash}
      VERTEX_TEMPERATURE: ${VERTEX_TEMPERATURE:-0.7}
      VERTEX_TIMEOUT_SECONDS: ${VERTEX_TIMEOUT_SECONDS:-45}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-1536}
      GEMINI_EMBEDDING_TIMEOUT_SECONDS: ${GEMINI_EMBEDDING_TIMEOUT_SECONDS:-45}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://dndmind:dndmind@postgres:5432/dndmind}
      DATABASE_URL: ${DATABASE_URL:-postgresql://dndmind:dndmind@postgres:5432/dndmind}
    ports:
      - "8001:8001"
    volumes:
      - ${ADC_HOST_DIR:-./.gcloud}:/gcloud:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    container_name: dndmind-api
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=dndmind;Username=dndmind;Password=dndmind}
      AI_WORKER_URL: ${AI_WORKER_URL:-http://ai-worker:8001}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ai-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      target: dev
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: dndmind-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  web-node-modules:
  web-next-cache:
